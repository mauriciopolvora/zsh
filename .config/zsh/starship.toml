"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
format = "$hostname$directory$git_branch$git_status$nodejs$bun$cmd_duration$character"
right_format = "$time"

[hostname]
ssh_only = true
format = "[\\($hostname\\)](bold red) "

[directory]
format = "[$path](cyan) "
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = "git "
format = "[$symbol$branch](bold purple) "

[git_status]
format = "($ahead_behind$staged$modified$untracked$deleted$conflicted)"
ahead = "[+$count ](bold cyan)"
behind = "[-$count ](bold cyan)"
diverged = "[+$ahead_count-$behind_count ](bold cyan)"
staged = "[+$count ](bold green)"
modified = "[~$count ](bold yellow)"
untracked = "[?$count ](bold white)"
deleted = "[x$count ](bold red)"
conflicted = "[!$count ](bold red)"

[nodejs]
symbol = ""
format = "[node $version](green) "

[bun]
symbol = ""
format = "[bun $version](yellow) "

[cmd_duration]
min_time = 1000
format = "[${duration}](dimmed yellow) "

[time]
disabled = false
format = "[$time](dimmed white)"
time_format = "%H:%M"

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
